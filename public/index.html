<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <meta
      name="description"
      content="Subtitle Hub - بحث عن الأفلام والمسلسلات وجلب الترجمات عبر TMDb وSubDL وOpenSubtitles."
    />
    <meta property="og:title" content="Subtitle Hub | منصة بحث ترجمات احترافية" />
    <meta
      property="og:description"
      content="ابحث عن الأفلام والمسلسلات، واكتشف أفضل الترجمات المصنفة بالثقة والجودة عبر مصادر متعددة."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ar_AR" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Subtitle Hub | بحث ترجمات أفلام ومسلسلات</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <a class="brand" href="/">Subtitle Hub</a>
        <form id="globalSearchForm" class="global-search" role="search" aria-label="بحث سريع">
          <input
            id="globalSearchInput"
            type="search"
            placeholder="ابحث عن فيلم أو مسلسل..."
            autocomplete="off"
          />
          <button type="submit">بحث</button>
        </form>
        <div class="header-controls">
          <div class="header-control-group" id="langSwitcher" role="group" aria-label="Language switcher">
            <button type="button" class="header-toggle" data-lang="ar">العربية</button>
            <button type="button" class="header-toggle" data-lang="en">English</button>
          </div>
          <button type="button" id="themeToggleBtn" class="header-toggle">Dark</button>
        </div>
        <nav class="nav-links" aria-label="التنقل الرئيسي">
          <a href="/" data-nav="home" class="is-active">الرئيسية</a>
          <a href="/search" data-nav="search">البحث</a>
          <a href="/api/health" target="_blank" rel="noopener">الحالة</a>
        </nav>
      </header>

      <main id="app"></main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
