# `npm run build` runs scripts/generate-launch-seo.mjs. Netlify sets URL / DEPLOY_PRIME_URL so
# public/robots.txt and public/sitemap.xml use the deploy origin (listed in .gitignore).
[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Subtitle aggregation (especially TV season scope + diagnostics=1) can exceed the Netlify Dev default
# (30s) while providers and HTML fallbacks run. Align with platform sync limits where possible.
[functions.subtitles]
  timeout = 60

[dev]
  publish = "public"
  functions = "netlify/functions"
  framework = "#static"

